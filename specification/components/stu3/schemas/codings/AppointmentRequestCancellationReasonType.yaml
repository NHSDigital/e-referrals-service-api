title: Appointment request cancellation reason type
description: This will only be returned when codeSystemType is REFERRAL-CANCELLATION-REASON
type: object
required:
  - code
  - valueCoding
properties:
  code:
    type: string
    enum:
      - appointmentRequestCancellationReasonType
  valueCoding:
    type: object
    required:
      - system
      - code
    properties:
      system:
        type: string
        enum:
          - 'https://fhir.nhs.uk/STU3/CodeSystem/eRS-AppointmentRequestCancellationReasonType-1'
        example: 'https://fhir.nhs.uk/STU3/CodeSystem/eRS-AppointmentRequestCancellationReasonType-1'
      code:
        type: string
        example: 'PROVIDER'
