description: |
  Where status code 504 (Gateway Timeout) is returned then an eRS-OperationOutcome-1 will be included in the body, as detailed below.
  In response to receiving this status code, it is recommended that clients retry at a later time.
  
  | Error code                         | Description                                                                                                                  |
  | ---------------------------------- | ---------------------------------------------------------------------------------------------------------------------------- |
  | GATEWAY_TIMEOUT                    | A request to an internal component timed out whilst attempting to serve a response.                                          |
headers:
  X-Correlation-ID:
    $ref: '../headers/response/CorrelationID.yaml'
  X-Request-ID:
    $ref: '../headers/response/RequestID.yaml'
  Content-Type:
    $ref: '../headers/response/ContentTypeFhirJson.yaml'
content:
  application/fhir+json:
    schema:
      $ref: '../STU3-OperationOutcome.yaml'
    example:
      $ref: '../../examples/STU3-GatewayTimeout.json'